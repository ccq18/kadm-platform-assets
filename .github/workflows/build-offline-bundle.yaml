name: Build Offline Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-offline-bundle.yaml
      - scripts/**
      - versions/**

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bundle tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Build bundle
        env:
          KADM_GITHUB_TOKEN: ${{ github.token }}
          KADM_GHCR_USERNAME: ${{ secrets.KADM_GHCR_USERNAME || github.actor }}
          KADM_GHCR_TOKEN: ${{ secrets.KADM_GHCR_TOKEN || github.token }}
        run: |
          chmod +x scripts/build-bundle.sh
          scripts/build-bundle.sh

      - name: Publish latest bundle release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bundle-latest
          name: KADM Platform Assets (latest)
          files: |
            dist/*.tgz
          overwrite_files: true
